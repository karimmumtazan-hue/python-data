<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 - Posisi & Role</title>
    <style>
        /* Tema Gelap Khas Dota 2 */
        body {
            background-color: #121212; /* Hitam pekat */
            background-image: radial-gradient(circle at 50% 0%, #2a1616 0%, #121212 80%);
            color: #d1d5db;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            color: #d32f2f; /* Merah khas Dota */
            text-shadow: 0 0 15px rgba(211, 47, 47, 0.6);
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #9ca3af;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        
        .role-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* Desain Kartu Interaktif */
        .role-card {
            background-color: rgba(30, 30, 30, 0.8);
            border: 2px solid #333333;
            border-radius: 12px;
            padding: 25px 15px;
            width: 130px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        /* Efek Hover Khas Merah Dota */
        .role-card:hover {
            transform: translateY(-8px) scale(1.05);
            background-color: rgba(45, 20, 20, 0.9);
            border-color: #ef4444; /* Merah menyala */
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.25);
        }
        
        .emoji {
            font-size: 45px;
            margin-bottom: 12px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .role-card:hover .emoji {
            transform: scale(1.2) translateY(-5px);
        }
        
        .role-name {
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #e5e7eb;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .role-pos {
            font-size: 0.8rem;
            color: #ef4444;
            font-weight: bold;
        }

        /* Kotak Informasi Bawah */
        #info-box {
            margin: 40px auto 0;
            padding: 25px;
            max-width: 650px;
            background-color: rgba(20, 20, 20, 0.9);
            border: 2px dashed #4b5563;
            border-radius: 10px;
            font-size: 1.15rem;
            line-height: 1.6;
            color: #9ca3af;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        
        .highlight {
            color: #ef4444;
            font-weight: bold;
            font-size: 1.4rem;
            display: block;
            margin-bottom: 12px;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
        }

        /* Tombol Kembali (Opsional, jika ingin tetap ada di versi lengkap) */
        .btn-back {
            display: inline-block;
            margin-top: 40px;
            background-color: transparent;
            color: #9ca3af;
            border: 1px solid #4b5563;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background-color: #374151;
            color: white;
            border-color: #9ca3af;
        }
    </style>
</head>
<body>

    <h1>🛡️ Pertempuran Ancients 🛡️</h1>
    <p>Pilih Posisi (Pos) untuk melihat tugas utamamu di Map Dota 2!</p>

    

    <div class="role-container">
        
        <div class="role-card" onclick="gantiInfo('⚔️ POS 1: CARRY', 'Fokus utama pada farming gold di Safelane. Ujung tombak kemenangan tim di akhir permainan (Late Game).')">
            <div class="emoji">⚔️</div>
            <div class="role-name">Carry</div>
            <div class="role-pos">Pos 1</div>
        </div>
        
        <div class="role-card" onclick="gantiInfo('🧙‍♂️ POS 2: MIDLANER', 'Bermain solo di jalur tengah untuk mendapat level dengan cepat dan melakukan <b>gank</b> (menyergap) musuh ke jalur lain.')">
            <div class="emoji">🧙‍♂️</div>
            <div class="role-name">Midlaner</div>
            <div class="role-pos">Pos 2</div>
        </div>

        <div class="role-card" onclick="gantiInfo('🪨 POS 3: OFFLANER', 'Hero tangguh (Initiator/Tank) yang bertugas menahan badan, mengacaukan jalur, dan mengganggu proses farming Carry lawan.')">
            <div class="emoji">🪨</div>
            <div class="role-name">Offlaner</div>
            <div class="role-pos">Pos 3</div>
        </div>

        <div class="role-card" onclick="gantiInfo('🏃 POS 4: SOFT SUPPORT', 'Sering berkeliling map (Roamer) untuk membantu jalur yang kesulitan, menyergap musuh, dan mengamankan rune/objektif.')">
            <div class="emoji">🏃</div>
            <div class="role-name">Soft Support</div>
            <div class="role-pos">Pos 4</div>
        </div>

        <div class="role-card" onclick="gantiInfo('👁️ POS 5: HARD SUPPORT', 'Berkorban demi tim! Bertugas melindungi Carry di awal game, membeli item vision (Ward), dan mengamankan pandangan map.')">
            <div class="emoji">👁️</div>
            <div class="role-name">Hard Support</div>
            <div class="role-pos">Pos 5</div>
        </div>

    </div>

    <div id="info-box">
        Klik salah satu kartu posisi di atas untuk mengecek detail tugasnya di sini.
    </div>

    <a href="/" class="btn-back">⬅️ Kembali ke Nexus Portal</a>

    <script>
        function gantiInfo(namaPosisi, deskripsiPosisi) {
            var kotakInfo = document.getElementById('info-box');
            // Ubah border dan shadow menjadi merah saat diklik
            kotakInfo.style.borderColor = '#ef4444';
            kotakInfo.style.boxShadow = "inset 0 0 20px rgba(239, 68, 68, 0.15)";
            
            // Masukkan teks HTML baru
            kotakInfo.innerHTML = "<span class='highlight'>" + namaPosisi + "</span>" + deskripsiPosisi;
        }
    </script>
</body>
</html>
