
{% extends 'base.html' %}

{% block title %}Form Siswa{% endblock %}

{% block content %}
   <h1 class="text-3xl font-bold text-slate-900">
       form siswa
   </h1>
   <p class="text-gray-600">Halaman Form Siswa Kelas X - HSI Boarding School Purworejo</p>
   <hr class="border-t border-slate-300 my-2" />
<form method="post" class="space-y-5">
    <!-- token keamanan anti-CSRF -->
    {% csrf_token %}

    <!-- form inputannya disini ntar -->

    
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nama</label>
        <input type="text" name="nama" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Umur</label>
        <input type="number" name="umur" min="1" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
        <input type="date" name="tanggal_lahir" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

   <div>
      <label class="block text-sm font-medium mb-1">Status Hadir</label>
      <div class="flex space-x-4 items-center">
           <label class="inline-flex items-center">
              <input type="radio" name="status_hadir" value="hadir" checked class="w-7 h-7 mr-2">
              <span>Hadir</span>
           </label>
           <label class="inline-flex items-center">
              <input type="radio" name="status_hadir" value="tidak hadir" class="w-7 h-7 mr-2">
              <span>Tidak Hadir</span>
           </label>
      </div>
   </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nilai Akhir</label>
        <input type="number" name="nilai_akhir" min="0" max="100" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="flex gap-3 pt-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
            Simpan
        </button>

        <a href="{% url 'siswa_list' %}"
           class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
            Batal
        </a>
    </div>
</form>
{% endblock %}
